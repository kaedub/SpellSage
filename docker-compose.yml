services:
  postgres:
    image: postgres:16-alpine
    container_name: spellsage-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: spellsage
      POSTGRES_PASSWORD: spellsage
      POSTGRES_DB: spellsage
    volumes:
      - spellsage_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U spellsage -d spellsage",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spellsage_pgdata:
